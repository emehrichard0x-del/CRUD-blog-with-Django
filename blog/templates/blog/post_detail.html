{% extends "blog/base.html" %}

{%block content%}
<div class="content-section">
    <h2>{{post.title}}</h2>
    <p>{{post.content}}</p>
    <hr>
    <small>{{post.pub_date}}</small>
    <div class="container">

    
       <a href="{% url 'post-update' post.pk %}" class="btn btn-primary btn md-5">Edit</a><br>
       <a href="{% url 'post-delete' post.pk %}" class="btn btn-primary btn md-5">delete</a> <br>
       <a href="{% url 'home'%}" class="btn btn-primary btn-md">Return home</a>
    </div>

</div>

{%endblock%}
